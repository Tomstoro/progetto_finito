<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mappa posti — UNIPR Aula Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="rooms.html">Aule Studio</a>
            <div class="d-flex gap-2">
                <a href="rooms.html" class="btn btn-outline-light btn-sm">Aule</a>
                <a href="bookings.html" class="btn btn-outline-light btn-sm">Prenotazioni</a>
                <a href="profile.html" class="btn btn-outline-light btn-sm">Profilo</a>
                <button id="logout-btn" class="btn btn-outline-light btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container main-content">
        <h1 class="h4" id="room-title">Aula (da selezionare)</h1>
        <section class="mb-4">
            <label for="booking-date" class="form-label">Data prenotazione</label>
            <input type="date" id="booking-date" class="form-control" required>
            <p class="form-text text-muted mt-2">Scegli una data entro un mese. I giorni festivi non sono disponibili.</p>
        </section>
        <div id="map-container" class="placeholder-box">
            <p class="text-muted mb-0">Seleziona una data e un orario per vedere i tavoli disponibili.</p>
        </div>
        <section class="booking-panel mt-4">
            <label for="timeslot-select" class="form-label">Fascia oraria</label>
            <select id="timeslot-select" class="form-select mb-3" disabled>
                <option>Seleziona prima una data</option>
            </select>
            <button type="button" id="book-btn" class="btn btn-primary" disabled>Conferma prenotazione</button>
        </section>
        <div id="message" class="alert alert-info mt-3" role="status">
            Seleziona data, ora e tavolo per prenotare.
        </div>
    </main>

    <script src="js/apiClient.js"></script>
    <script src="js/seatPresenter.js"></script>
    <script>
        document.getElementById('logout-btn')?.addEventListener('click', () => {
            ApiClient.logout();
        });
    </script>
</body>
</html>
