<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le mie prenotazioni — UNIPR Aula Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="rooms.html">Aule Studio</a>
            <div class="d-flex gap-2">
                <a href="rooms.html" class="btn btn-outline-light btn-sm">Aule</a>
                <a href="profile.html" class="btn btn-outline-light btn-sm">Profilo</a>
                <button id="logout-btn" class="btn btn-outline-light btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container main-content">
        <h1 class="h4 mb-4">Le mie prenotazioni</h1>
        <div class="table-responsive">
            <table class="table table-striped" id="bookings-table">
                <thead>
                    <tr>
                        <th>Aula</th>
                        <th>Posto</th>
                        <th>Slot</th>
                        <th>Stato</th>
                        <th>Data</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5" class="text-muted">Caricamento delle prenotazioni...</td></tr>
                </tbody>
            </table>
        </div>
        <a href="rooms.html" class="btn btn-outline-primary">Nuova prenotazione</a>
        <div id="message" class="alert alert-info mt-3" role="status">
            Visualizza qui le tue prenotazioni attive.
        </div>
    </main>

    <script src="js/apiClient.js"></script>
    <script src="js/bookingPresenter.js"></script>
    <script>
        document.getElementById('logout-btn')?.addEventListener('click', () => {
            ApiClient.logout();
        });
    </script>
</body>
</html>
