<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilo — UNIPR Aula Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="rooms.html">Aule Studio</a>
            <div class="d-flex gap-2">
                <a href="rooms.html" class="btn btn-outline-light btn-sm">Aule</a>
                <a href="bookings.html" class="btn btn-outline-light btn-sm">Prenotazioni</a>
                <a href="profile.html" class="btn btn-outline-light btn-sm">Profilo</a>
                <button id="logout-btn" class="btn btn-outline-light btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container main-content">
        <section class="card profile-card mb-4">
            <div class="card-body">
                <div class="d-flex flex-column flex-md-row justify-content-between align-items-start gap-3">
                    <div>
                        <h1 class="h4 mb-1">Il mio profilo</h1>
                        <p class="text-secondary mb-0">Gestisci le tue prenotazioni e aggiorna la password.</p>
                    </div>
                    <button id="logout-btn-top" class="btn btn-outline-secondary btn-sm">Logout</button>
                </div>
                <div class="profile-info mt-4 row g-3">
                    <div class="col-sm-6">
                        <div class="profile-field">Nome</div>
                        <div id="profile-name" class="profile-value"></div>
                    </div>
                    <div class="col-sm-6">
                        <div class="profile-field">Email</div>
                        <div id="profile-email" class="profile-value"></div>
                    </div>
                    <div class="col-sm-6">
                        <div class="profile-field">Matricola</div>
                        <div id="profile-matricola" class="profile-value"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="card mb-4">
            <div class="card-body">
                <h2 class="h5 mb-3">Le mie prenotazioni</h2>
                <div id="bookings-list" class="bookings-grid"></div>
                <div id="bookings-empty" class="text-muted">Nessuna prenotazione trovata.</div>
            </div>
        </section>

        <section class="card mb-4">
            <div class="card-body">
                <h2 class="h5 mb-3">Cambia password</h2>
                <form id="password-form" class="row g-3">
                    <div class="col-12 col-md-6">
                        <label for="currentPassword" class="form-label">Password attuale</label>
                        <input type="password" class="form-control" id="currentPassword" required>
                    </div>
                    <div class="col-12 col-md-6">
                        <label for="newPassword" class="form-label">Nuova password</label>
                        <input type="password" class="form-control" id="newPassword" required>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">Aggiorna password</button>
                    </div>
                </form>
            </div>
        </section>

        <div id="message" class="alert d-none" role="status"></div>
    </main>

    <script src="js/apiClient.js"></script>
    <script src="js/profilePresenter.js"></script>
</body>
</html>
