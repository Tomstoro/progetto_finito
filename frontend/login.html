<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — UNIPR Aula Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="container login-container">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 text-primary mb-3">UNIPR Aula Studio Booking</h1>
                <p class="text-muted small">Accedi al sistema con le credenziali dell'utente.</p>
                <form id="login-form">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Accedi</button>
                </form>
                <p class="small text-muted mt-3">
                    <a href="rooms.html">Salta al elenco aule (dev)</a>
                </p>
                <div id="message" class="alert alert-info mt-3 d-none" role="status"></div>
            </div>
        </div>
    </main>
    <script src="js/apiClient.js"></script>
    <script src="js/loginPresenter.js"></script>
</body>
</html>
