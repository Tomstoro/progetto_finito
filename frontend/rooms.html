<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aule — UNIPR Aula Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="rooms.html">Aule Studio</a>
            <div class="d-flex gap-2">
                <a href="rooms.html" class="btn btn-outline-light btn-sm">Aule</a>
                <a href="bookings.html" class="btn btn-outline-light btn-sm">Prenotazioni</a>
                <a href="profile.html" class="btn btn-outline-light btn-sm">Profilo</a>
                <button id="logout-btn" class="btn btn-outline-light btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container main-content">
        <h1 class="h4 mb-4">Seleziona un'aula</h1>
        <div id="rooms-list"></div>
        <div id="message" class="alert alert-info mt-3" role="status">
            Seleziona un'aula per procedere alla prenotazione.
        </div>
    </main>

    <script src="js/apiClient.js"></script>
    <script src="js/roomPresenter.js"></script>
    <script>
        document.getElementById('logout-btn')?.addEventListener('click', () => {
            ApiClient.logout();
        });
    </script>
</body>
</html>
